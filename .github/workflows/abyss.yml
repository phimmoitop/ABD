name: Abyss 999 -> M3U8 -> Deploy -> AV1 -> Error

on:
  workflow_dispatch:
    inputs:
      id:
        description: 'ID'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      projectName:
        description: 'projectName'
        required: true
      accountId:
        description: 'AccountID'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v2

      - name: Download abyss-dl.jar
        run: |
          mkdir -p tools
          curl -L \
            -o tools/abyss-dl.jar \
            https://github.com/abdlhay/AbyssVideoDownloader/releases/latest/download/abyss-dl.jar

      - name: Process Video (Download & Transcode if AV1)
        run: |
          ORIGINAL_FILE="${{ github.event.inputs.slug }}_raw.mp4"
          FINAL_INPUT="${{ github.event.inputs.slug }}.mp4"

          # 1. Download
          java -jar tools/abyss-dl.jar "${{ github.event.inputs.id }}" h -o "$ORIGINAL_FILE"

          if [ ! -f "$ORIGINAL_FILE" ]; then
            echo "Không tìm thấy file sau khi tải"
            exit 1
          fi

          # 2. Detect Codec
          CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$ORIGINAL_FILE")
          echo "Detected codec: $CODEC"

          # 3. Logic xử lý AV1 hoặc không phải H264
          if [ "$CODEC" = "av1" ] || [ "$CODEC" != "h264" ]; then
            echo "Tiến hành encode lại video sang H.264..."
            ffmpeg -i "$ORIGINAL_FILE" \
              -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 -crf 23 -preset medium \
              -maxrate 2000k -bufsize 3000k \
              -force_key_frames "expr:gte(t,n_forced*5)" -sc_threshold 0 \
              -vsync cfr -c:a aac -b:a 128k -ac 2 -threads 0 -movflags +faststart \
              "$FINAL_INPUT"
          else
            echo "Codec đã là H.264, giữ nguyên file gốc."
            mv "$ORIGINAL_FILE" "$FINAL_INPUT"
          fi

      - name: Convert H264 to HLS (.m3u8 fMP4)
        run: |
          mkdir -p output
          INPUT="${{ github.event.inputs.slug }}.mp4"

          ffmpeg -i "$INPUT" \
            -map 0:v:0 \
            -map 0:a:0 \
            -c:v copy \
            -c:a aac \
            -profile:a aac_low \
            -ar 48000 \
            -ac 2 \
            -b:a 128k \
            -start_number 10001 \
            -hls_time 4 \
            -hls_list_size 0 \
            -hls_segment_type fmp4 \
            -hls_segment_filename "output/${{ github.event.inputs.slug }}-index%d.png" \
            -f hls "output/${{ github.event.inputs.slug }}.m3u8"

          # Đổi tên init.mp4 thành ${{ github.event.inputs.slug }}-index.png và sửa trong playlist
          if [ -f "output/init.mp4" ]; then
            mv "output/init.mp4" "output/${{ github.event.inputs.slug }}-index.png"
            sed -i "s/init.mp4/${{ github.event.inputs.slug }}-index.png/" "output/${{ github.event.inputs.slug }}.m3u8"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.accountId }}
          projectName: ${{ github.event.inputs.projectName }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

            
      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.projectName }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.projectName }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minutes for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            curl -G "https://cp.ssplay.net/cf.php" \
            --data-urlencode "type=ok" \
            --data-urlencode "key=${{ github.event.inputs.projectName }}" \
            --data-urlencode "slug=${{ github.event.inputs.slug }}"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry – reuse encoded files)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.accountId }}
          projectName: ${{ github.event.inputs.projectName }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
